---
argument_specs:
  main:
    short_description: "Install Agave Solana validator"
    author: "Hayek Validator Team"
    description:
      - "Installs and configures an Agave Solana validator"
      - "Automatically installs dependencies (solana_cli_agave, solana_validator_shared)"
      - "Configures validator keys and startup scripts"
    options:
      validator_name:
        type: str
        required: true
        description: "Name of the validator instance"
      validator_type:
        type: str
        required: false
        default: "hot-spare"
        choices: ["primary", "hot-spare"]
        description: "Validator identity mode (primary or hot-spare, defaults to hot-spare)"
      agave_version:
        type: str
        required: true
        description: "Version of Agave to install (semantic versioning, e.g. 2.3.6)"
      solana_cluster:
        type: str
        required: true
        choices: ["localnet", "testnet", "mainnet"]
        description: "Target Solana cluster"
      expected_shred_version:
        type: int
        required: false
        description: "Expected cluster shred version rendered as --expected-shred-version. Required when XDP zero-copy is effectively enabled unless expected_shred_version_auto_detect is true."
      expected_shred_version_auto_detect:
        type: bool
        required: false
        default: false
        description: "When true and expected_shred_version is unset, query the configured RPC URL and use the majority non-zero cluster shredVersion."
      force_host_cleanup:
        type: bool
        required: false
        default: false
        description: "Force cleanup of existing validator data"
      build_from_source:
        type: bool
        required: false
        default: false
        description: "Build from source instead of using precompiled binaries"
      use_official_repo:
        type: bool
        required: false
        default: false
        description: "Use official repository instead of forked repository when building from source"
      xdp_enabled:
        type: bool
        required: false
        default: false
        description: "Enable XDP support for validator networking when host/client capabilities allow it"
      xdp_mode:
        type: str
        required: false
        default: "native"
        description: "Requested XDP mode when supported by agave-validator flags"
      xdp_target_interface:
        type: str
        required: false
        default: ""
        description: "Optional network interface override for XDP preflight checks (auto-detect when empty)"
      xdp_zero_copy:
        type: bool
        required: false
        default: false
        description: "Enable XDP zero-copy startup mode. On non-localnet clusters, also set expected_shred_version_auto_detect=true or expected_shred_version."
      xdp_experimental_retransmit_xdp_zero_copy:
        type: bool
        required: false
        default: false
        description: "Deprecated alias for xdp_zero_copy; temporarily accepted for compatibility."
      xdp_numa_check_enabled:
        type: bool
        required: false
        default: true
        description: "Run shared NUMA placement assessment between XDP retransmit cores and PoH pinned core"
      xdp_ring_config_enabled:
        type: bool
        required: false
        default: false
        description: "Persist NIC RX/TX ring sizes with a systemd unit ordered before the validator service"
      xdp_ring_interface:
        type: str
        required: false
        default: ""
        description: "Optional interface override for persistent XDP ring sizing; defaults to the selected XDP interface"
      xdp_ring_rx:
        type: int
        required: false
        default: 4096
        description: "Requested RX ring size when xdp_ring_config_enabled is true"
      xdp_ring_tx:
        type: int
        required: false
        default: 4096
        description: "Requested TX ring size when xdp_ring_config_enabled is true"
      solana_validator_ha_install_enabled:
        type: bool
        required: false
        default: true
        description: "Install solana-validator-ha alongside the validator setup without enabling the HA runtime"
      solana_validator_ha_install_from_source:
        type: bool
        required: false
        default: false
        description: "Build solana-validator-ha from source instead of installing the published binary release"
      solana_validator_ha_version:
        type: str
        required: false
        default: "0.1.19"
        description: "Version of solana-validator-ha to install"
      solana_validator_ha_node_name:
        type: str
        required: false
        description: "Vanity node name to publish in the solana-validator-ha config"
      solana_validator_ha_node_id:
        type: str
        required: false
        description: "Stable globally-unique HA short name (for example ark, fog, ice) used as the runtime node name"
      solana_validator_ha_priority:
        type: int
        required: false
        description: "Deterministic failover priority for this node; lower value wins"
      solana_validator_ha_public_ip_value:
        type: str
        required: false
        description: "Public IP value written to the local public-ip helper file"
      solana_validator_ha_active_identity_path:
        type: str
        required: false
        description: "Absolute path to the shared active identity keypair file"
      solana_validator_ha_passive_identity_path:
        type: str
        required: false
        description: "Absolute path to this node's fixed passive identity keypair file"
      solana_validator_ha_cluster_name:
        type: str
        required: false
        description: "Cluster name written to the solana-validator-ha config"
      solana_validator_ha_cluster_rpc_urls:
        type: list
        elements: str
        required: false
        description: "RPC URLs used by solana-validator-ha for gossip state"
      solana_validator_ha_inventory_group:
        type: str
        required: false
        description: "Inventory group used to auto-derive HA node ordering and peers"
      solana_validator_ha_pair_hosts:
        type: list
        elements: str
        required: false
        description: "Ordered list of HA hosts used to auto-derive validator-1/validator-2 naming and peers"
      solana_validator_ha_peer_hostnames:
        type: list
        elements: str
        required: false
        description: "Explicit peer inventory hostnames used to derive HA peers when solana_validator_ha_peers is omitted"
      solana_validator_ha_peers:
        type: dict
        required: false
        description: "Mapping of peer validator names to IPs for solana-validator-ha runtime"
