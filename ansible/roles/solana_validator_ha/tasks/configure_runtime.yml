---
- name: solana_validator_ha - Derive validator keyset directory when absent
  ansible.builtin.set_fact:
    validator_keyset_dir: "{{ validator_keys_dir }}/{{ validator_name }}"
  when:
    - validator_keyset_dir is not defined
    - validator_keys_dir is defined
    - validator_name is defined

- name: solana_validator_ha - Determine effective inventory group
  ansible.builtin.set_fact:
    solana_validator_ha_inventory_group_effective: >-
      {{
        solana_validator_ha_inventory_group
        if (solana_validator_ha_inventory_group | default('') | length > 0)
        else (
          'solana_validator_ha_pair'
          if ('solana_validator_ha_pair' in group_names)
          else ''
        )
      }}

- name: solana_validator_ha - Determine ordered HA host list from vars or inventory group
  ansible.builtin.set_fact:
    solana_validator_ha_effective_hosts: >-
      {{
        solana_validator_ha_pair_hosts
        if (solana_validator_ha_pair_hosts | default([]) | length > 0)
        else (
          groups[solana_validator_ha_inventory_group_effective]
          if (
            solana_validator_ha_inventory_group_effective | default('') | length > 0 and
            solana_validator_ha_inventory_group_effective in groups
          )
          else []
        )
      }}

- name: solana_validator_ha - Derive peer hostnames from ordered HA host list
  ansible.builtin.set_fact:
    solana_validator_ha_peer_hostnames: "{{ solana_validator_ha_effective_hosts | difference([inventory_hostname]) }}"
  when:
    - solana_validator_ha_peer_hostnames | default([]) | length == 0
    - solana_validator_ha_effective_hosts | default([]) | length > 1
    - inventory_hostname in solana_validator_ha_effective_hosts

- name: solana_validator_ha - Derive node name from ordered HA host list
  ansible.builtin.set_fact:
    solana_validator_ha_node_name: "validator-{{ (solana_validator_ha_effective_hosts.index(inventory_hostname) | int) + 1 }}"
  when:
    - solana_validator_ha_effective_hosts | default([]) | length > 0
    - inventory_hostname in solana_validator_ha_effective_hosts
    - (solana_validator_ha_node_name | default(inventory_hostname)) == inventory_hostname

- name: solana_validator_ha - Derive peer map from peer hostnames
  ansible.builtin.set_fact:
    solana_validator_ha_peers: >-
      {{
        dict(
          (
            (
              "validator-" ~ (((solana_validator_ha_effective_hosts.index(item) | int) + 1) | string)
            )
            if (item in (solana_validator_ha_effective_hosts | default([])))
            else item,
            hostvars[item].solana_validator_ha_public_ip_value | default(hostvars[item].ansible_host | default(item))
          )
          for item in (solana_validator_ha_peer_hostnames | default([]))
        )
      }}
  when:
    - solana_validator_ha_peers | default({}) | length == 0
    - solana_validator_ha_peer_hostnames | default([]) | length > 0

- name: solana_validator_ha - Validate runtime variables
  ansible.builtin.assert:
    that:
      - validator_name is defined
      - validator_keyset_dir is defined
      - validator_service_name is defined
      - validator_scripts_dir is defined
      - validator_operators_group is defined
      - solana_user is defined
      - solana_validator_ha_peers is mapping
      - solana_validator_ha_peers | length > 0
    fail_msg: >-
      solana-validator-ha runtime integration requires validator_name, validator_keyset_dir,
      validator_service_name, validator_scripts_dir, solana_user, and at least one configured
      peer in solana_validator_ha_peers. Provide solana_validator_ha_peers directly or
      supply solana_validator_ha_pair_hosts / solana_validator_ha_inventory_group so peers
      and node names can be derived automatically.

- name: solana_validator_ha - Ensure runtime configuration directory exists
  ansible.builtin.file:
    path: "{{ solana_validator_ha_config_dir }}"
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "{{ validator_root_dir_mode | default('2775') }}"
    state: directory
  become: true

- name: solana_validator_ha - Render role transition wrapper script
  ansible.builtin.template:
    src: ha-set-role.sh.j2
    dest: "{{ solana_validator_ha_wrapper_script_path }}"
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "{{ validator_scripts_file_mode | default('0754') }}"
  become: true

- name: solana_validator_ha - Write public IP file for local helper service
  ansible.builtin.copy:
    content: "{{ solana_validator_ha_public_ip_value | trim }}\n"
    dest: "{{ solana_validator_ha_public_ip_file_path }}"
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "0644"
  become: true

- name: solana_validator_ha - Render HA configuration file
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ solana_validator_ha_config_path }}"
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "0640"
  become: true

- name: solana_validator_ha - Deploy public IP helper systemd unit
  ansible.builtin.template:
    src: public-ip.service.j2
    dest: "/etc/systemd/system/{{ solana_validator_ha_public_ip_service_name }}.service"
    owner: "root"
    group: "root"
    mode: "0644"
  become: true

- name: solana_validator_ha - Deploy HA systemd unit
  ansible.builtin.template:
    src: service.j2
    dest: "/etc/systemd/system/{{ solana_validator_ha_service_name }}.service"
    owner: "root"
    group: "root"
    mode: "0644"
  become: true

- name: solana_validator_ha - Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: solana_validator_ha - Enable and start public IP helper
  ansible.builtin.systemd:
    name: "{{ solana_validator_ha_public_ip_service_name }}"
    enabled: true
    state: started
  become: true

- name: solana_validator_ha - Enable and start HA service
  ansible.builtin.systemd:
    name: "{{ solana_validator_ha_service_name }}"
    enabled: true
    state: started
  become: true
