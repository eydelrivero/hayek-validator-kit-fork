---
- name: solana_validator_ha - Prepare runtime variables before staged commit
  ansible.builtin.import_tasks: prepare_runtime_vars.yml

- name: solana_validator_ha - Assert staged runtime files are present
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ solana_validator_ha_staged_public_ip_file_path }}"
    - "{{ solana_validator_ha_staged_config_path }}"
  register: solana_validator_ha_commit_stage_files
  changed_when: false
  become: true

- name: solana_validator_ha - Validate staged runtime files before commit
  ansible.builtin.assert:
    that:
      - item.stat.exists | default(false)
    fail_msg: "Cannot commit HA runtime because staged file {{ item.item }} is missing."
  loop: "{{ solana_validator_ha_commit_stage_files.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: solana_validator_ha - Capture current runtime file state before commit
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ solana_validator_ha_public_ip_file_path }}"
    - "{{ solana_validator_ha_config_path }}"
  register: solana_validator_ha_runtime_file_state
  changed_when: false
  become: true

- name: solana_validator_ha - Backup live runtime files before commit
  ansible.builtin.copy:
    src: "{{ item.stat.path }}"
    dest: "{{ item.stat.path }}.bak.{{ solana_validator_ha_reconcile_generation }}"
    remote_src: true
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "{{ '0644' if item.stat.path == solana_validator_ha_public_ip_file_path else '0640' }}"
  loop: "{{ solana_validator_ha_runtime_file_state.results }}"
  loop_control:
    label: "{{ item.stat.path }}"
  when: item.stat.exists | default(false)
  become: true

- name: solana_validator_ha - Install committed public IP file
  ansible.builtin.copy:
    src: "{{ solana_validator_ha_staged_public_ip_file_path }}"
    dest: "{{ solana_validator_ha_public_ip_file_path }}"
    remote_src: true
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "0644"
  become: true

- name: solana_validator_ha - Install committed HA configuration file
  ansible.builtin.copy:
    src: "{{ solana_validator_ha_staged_config_path }}"
    dest: "{{ solana_validator_ha_config_path }}"
    remote_src: true
    owner: "root"
    group: "{{ validator_operators_group }}"
    mode: "0640"
  become: true

- name: solana_validator_ha - Reload systemd after staged commit
  ansible.builtin.systemd:
    daemon_reload: true
  become: true

- name: solana_validator_ha - Ensure public IP helper is enabled and started
  ansible.builtin.systemd:
    name: "{{ solana_validator_ha_public_ip_service_name }}"
    enabled: true
    state: started
  become: true

- name: solana_validator_ha - Restart HA service after staged commit
  ansible.builtin.systemd:
    name: "{{ solana_validator_ha_service_name }}"
    enabled: true
    state: restarted
  become: true

- name: solana_validator_ha - Verify HA service is active after staged commit
  ansible.builtin.systemd:
    name: "{{ solana_validator_ha_service_name }}"
  register: solana_validator_ha_service_status_after_commit
  changed_when: false
  become: true

- name: solana_validator_ha - Assert HA service is active after staged commit
  ansible.builtin.assert:
    that:
      - solana_validator_ha_service_status_after_commit.status.ActiveState == "active"
    fail_msg: >-
      solana-validator-ha service failed to become active on {{ inventory_hostname }}
      after staged runtime commit.
