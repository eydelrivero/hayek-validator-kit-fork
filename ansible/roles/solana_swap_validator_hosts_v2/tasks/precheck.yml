---
- name: precheck - Ensure operator user variables are defined
  ansible.builtin.assert:
    that:
      - operator_user is defined
      - validator_operators_group is defined
    fail_msg: >-
      operator_user and validator_operators_group must be defined to validate RBAC membership.
  run_once: true

- name: precheck - Validate operator user belongs to validator_operators on destination host
  block:
    - name: precheck - Get operator user groups
      ansible.builtin.command: "id -nG {{ operator_user }}"
      register: operator_user_groups
      changed_when: false
      check_mode: false

    - name: precheck - Fail if operator user is not in validator_operators group
      ansible.builtin.fail:
        msg: >-
          operator_user '{{ operator_user }}' is not a member of '{{ validator_operators_group }}'
          on destination host {{ destination_host }}. Run the playbook as a user in the operator group.
      when: validator_operators_group not in (operator_user_groups.stdout | default('') | split)
  delegate_to: "{{ destination_host }}"
  run_once: true

- name: precheck - Set fact for solana cluster
  ansible.builtin.set_fact:
    solana_cluster: >-
      {{ (group_names | select('match', '^solana_.*') | list | first | regex_replace('^solana_', '')) if (group_names | select('match', '^solana_.*') | list | length > 0) else 'localnet' }}
  run_once: true

- name: precheck - Validate source and destination hosts are different
  ansible.builtin.fail:
    msg: >-
      Source and destination hosts must be different!
      Source host: {{ source_host }}
      Destination host: {{ destination_host }}
      Using the same host for both source and destination can cause data loss and unexpected behavior.
  when: source_host == destination_host
  run_once: true

- name: precheck - Validate source host validator directory
  block:
    - name: precheck - Get stats of source validator directory
      ansible.builtin.stat:
        path: "{{ source_host_keys_dir }}"
      register: source_validator_keys_dir
      when: inventory_hostname == source_host

    - name: precheck - Set source directory validation fact
      ansible.builtin.set_fact:
        source_dir_valid: >-
          {{
            source_validator_keys_dir.stat.isdir is defined and
            source_validator_keys_dir.stat.isdir
          }}
      when: inventory_hostname == source_host

- name: precheck - Validate destination host validator directory
  block:
    - name: precheck - Get stats of destination validator directory
      ansible.builtin.stat:
        path: "{{ destination_host_keys_dir }}"
      register: destination_validator_keys_dir
      when: inventory_hostname == destination_host

    - name: precheck - Set destination directory validation fact
      ansible.builtin.set_fact:
        destination_dir_valid: >-
          {{
            destination_validator_keys_dir.stat.isdir is defined and
            destination_validator_keys_dir.stat.isdir
          }}
      when: inventory_hostname == destination_host

- name: precheck - Set validation facts for all hosts
  ansible.builtin.set_fact:
    source_validation: "{{ hostvars[source_host].source_dir_valid | default(false) }}"
    destination_validation: "{{ hostvars[destination_host].destination_dir_valid | default(false) }}"

- name: precheck - Fail if either directory validation failed
  ansible.builtin.fail:
    msg: >-
      Directory validation failed:
      {% if not source_validation %}Source directory '{{ source_host_keys_dir }}' is invalid on {{ source_host }}{% endif %}
      {% if not destination_validation %}Destination directory '{{ destination_host_keys_dir }}' is invalid on {{ destination_host }}{% endif %}
  when: not (source_validation and destination_validation)
  run_once: true

- name: precheck - Check whether python3-psutil is already installed
  ansible.builtin.command: dpkg-query -W -f='${Status}' python3-psutil
  register: python3_psutil_package
  changed_when: false
  failed_when: false

- name: precheck - Ensure python3-psutil is installed when missing
  ansible.builtin.apt:
    name: python3-psutil
    state: present
    update_cache: yes
    lock_timeout: 120
  become: true
  when:
    - python3_psutil_package.rc != 0 or 'install ok installed' not in (python3_psutil_package.stdout | default(''))

- name: precheck - Ensure solana-validator-ha binary is installed on swap hosts
  block:
    - name: precheck - Check solana-validator-ha binary path
      ansible.builtin.stat:
        path: "{{ solana_validator_ha_binary_path | default('/usr/local/bin/solana-validator-ha') }}"
      register: solana_validator_ha_binary

    - name: precheck - Fail if solana-validator-ha is missing
      ansible.builtin.fail:
        msg: >-
          solana-validator-ha binary was not found at
          {{ solana_validator_ha_binary_path | default('/usr/local/bin/solana-validator-ha') }}
          on {{ inventory_hostname }}.
          Install it via the Agave/Jito validator setup before running the swap playbook.
      when: not solana_validator_ha_binary.stat.exists
  when: solana_validator_ha_install_enabled | default(true) | bool

- name: precheck - Set current host client fact
  ansible.builtin.set_fact:
    current_host_client: >-
      {{ source_client | default('agave') if inventory_hostname == source_host else destination_client | default('agave') }}

- name: precheck - Validate destination host validator status
  block:
    - name: precheck - Check validator systemd service status
      ansible.builtin.systemd:
        name: "{{ validator_service_name }}"
      register: validator_service
      changed_when: false

    - name: precheck - Check validator process status
      ansible.builtin.shell: >
        pgrep -f "{{ 'fdctl' if (destination_client | default('agave') == 'firedancer') else 'agave-validator' }}"
      register: validator_process
      changed_when: false
      failed_when: validator_process.rc != 0

    - name: precheck - Assert validator systemd service is active
      ansible.builtin.assert:
        that:
          - validator_service.status.ActiveState == "active"
        fail_msg: "Validator systemd service is not active on destination host {{ destination_host }}. Current state: {{ validator_service.status.ActiveState }}"
  when: inventory_hostname == destination_host

- name: precheck - Validate validator identity matches running process (agave/jito)
  block:
    - name: precheck - Get validator contact info and extract identity
      ansible.builtin.shell: "{{ system_solana_active_release_dir }}/agave-validator -l {{ ledger_path }} contact-info | head -1 | sed 's/Identity: //'"
      register: ledger_identity
      changed_when: false
      check_mode: false
      become: true
      become_user: "{{ solana_user }}"

    - name: precheck - Set ledger identity fact for host
      ansible.builtin.set_fact:
        ledger_identity_pubkey: "{{ ledger_identity.stdout | trim }}"
      when: ledger_identity is defined and ledger_identity.stdout is defined

    - name: precheck - Get running validator identity file path
      ansible.builtin.shell: "ps aux | grep agave-validator | grep -v grep | grep -o '--identity [^ ]*' | cut -d' ' -f2"
      register: running_identity_file
      changed_when: false
      check_mode: false

    - name: precheck - Get pubkey from running identity file
      ansible.builtin.command: solana-keygen pubkey {{ running_identity_file.stdout }}
      register: running_pubkey
      environment:
        PATH: "{{ system_solana_active_release_dir }}"
      changed_when: false
      check_mode: false
      when: running_identity_file.stdout != ''

    - name: precheck - Set running pubkey fact for host
      ansible.builtin.set_fact:
        running_identity_pubkey: "{{ running_pubkey.stdout_lines[0] | default('') }}"
      when:
        - running_pubkey is defined
        - running_pubkey.stdout_lines is defined
        - running_pubkey.stdout_lines | length > 0

    - name: precheck - Warn if validator uses legacy identity symlink startup
      ansible.builtin.debug:
        msg: >-
          WARNING: {{ inventory_hostname }} is running the validator with legacy
          identity path '{{ running_identity_file.stdout | trim }}'.
          This host still uses the pre-d35baa9 symlink-based startup flow
          (`--identity .../identity.json`), but the current hot-swap role no longer
          manages `identity.json`. Re-running the validator setup role is recommended
          before attempting a hot swap.
      when:
        - running_identity_file.stdout | default('') | trim != ''
        - (running_identity_file.stdout | trim | basename) == 'identity.json'

    - name: precheck - Fail if identity mismatch
      ansible.builtin.fail:
        msg: >
          {{ inventory_hostname }} host identity mismatch!
          Ledger identity: {{ ledger_identity.stdout | default('N/A') }}
          Running identity pubkey: {{ running_pubkey.stdout | default('N/A') }}
          The validator service is not using the expected identity file.
      when:
        - (ledger_identity.stdout | default('')) != (running_pubkey.stdout | default(''))
        - (ledger_identity.stdout | default('')) != ''
        - (running_pubkey.stdout | default('')) != ''
  when: current_host_client != 'firedancer'

- name: precheck - Validate validator identity (firedancer)
  block:
    - name: precheck - Derive firedancer config path for this host
      ansible.builtin.set_fact:
        _precheck_firedancer_config_path: >-
          {{ validator_root_dir }}/config/{{
            hostvars[source_host]['source_validator_name']
            if inventory_hostname == source_host
            else hostvars[destination_host]['destination_validator_name']
          }}/firedancer.toml

    # Try the live getIdentity RPC first (quick, no retries). When the validator is
    # fully running this returns the live identity — critical for detecting "already
    # completed" on re-runs. During early startup the RPC returns an empty identity
    # string or fails entirely; in that case fall back to reading identity_path from
    # firedancer.toml and calling fdctl keys pubkey on the key file directly.
    - name: precheck - Get firedancer live identity (RPC with config fallback)
      ansible.builtin.shell: |
        identity=$(curl -sf --max-time 2 -X POST -H "Content-Type: application/json" \
          -d '{"jsonrpc":"2.0","id":1,"method":"getIdentity"}' \
          "http://127.0.0.1:{{ solana_rpc_port | default(8899) }}" 2>/dev/null \
          | jq -r 'if (.result.identity // "") != "" then .result.identity else empty end' 2>/dev/null \
          || true)
        if [ -n "$identity" ] && [ "$identity" != "null" ]; then
          printf '%s\n' "$identity"
        else
          identity_path=$(sed -n 's/.*identity_path\s*=\s*"\([^"]*\)".*/\1/p' \
            "{{ _precheck_firedancer_config_path }}" | head -1)
          fdctl --config "{{ _precheck_firedancer_config_path }}" keys pubkey "$identity_path" \
            | grep -v '^Log at'
        fi
      register: firedancer_live_identity
      changed_when: false
      check_mode: false
      become: true
      environment:
        PATH: "/usr/local/bin:{{ system_solana_active_release_dir }}:/usr/bin:/bin"
      failed_when: >-
        firedancer_live_identity.rc != 0
        or (firedancer_live_identity.stdout | default('') | trim) == ''

    - name: precheck - Set ledger identity fact for firedancer host
      ansible.builtin.set_fact:
        ledger_identity_pubkey: "{{ firedancer_live_identity.stdout | trim }}"
  when: current_host_client == 'firedancer'

- name: precheck - Set global facts for running ledger identities
  ansible.builtin.set_fact:
    # Use ledger_identity_pubkey as primary (from contact-info), fallback to running_identity_pubkey (from process)
    source_ledger_identity: "{{ hostvars[source_host]['ledger_identity_pubkey'] | default(hostvars[source_host]['running_identity_pubkey'] | default('')) }}"
    destination_ledger_identity: "{{ hostvars[destination_host]['ledger_identity_pubkey'] | default(hostvars[destination_host]['running_identity_pubkey'] | default('')) }}"
  run_once: true
