---
- name: prepare - Resolve inactive-install flag
  # Inactive install: stage Firedancer artifacts alongside a different live client (e.g. jito-bam)
  # on the shared `sol` service WITHOUT stopping it, overwriting its unit, or starting Firedancer.
  # The host-local switch-validator-client.sh flips which staged flavor owns `sol` later.
  ansible.builtin.set_fact:
    _fd_inactive: "{{ validator_inactive_install | default(false) | bool }}"

- name: prepare - Resolve Jito BAM block engine URL for Frankendancer bundle
  when: frankendancer_jito_enabled | default(false) | bool
  block:
    - name: prepare - Build Jito BAM region key
      ansible.builtin.set_fact:
        jito_bam_region_key: "jito_{{ solana_cluster }}_bam_region"

    - name: prepare - Resolve Jito BAM target region for this host
      ansible.builtin.set_fact:
        jito_target_bam_region: "{{ hostvars[inventory_hostname][jito_bam_region_key] | default('') }}"

    - name: prepare - Require BAM region assignment
      ansible.builtin.fail:
        msg: "Host {{ inventory_hostname }} must be in a BAM region group (city_dal, city_lax, ...) when frankendancer_jito_enabled=true"
      when: jito_target_bam_region == ''

    - name: prepare - Verify BAM endpoint mapping exists
      ansible.builtin.assert:
        that:
          - jito_bam_endpoints is defined
          - jito_bam_endpoints[jito_target_bam_region] is defined
        fail_msg: "No Jito BAM endpoint mapping for region '{{ jito_target_bam_region }}'."

    - name: prepare - Set block_engine_url from region mapping (allow explicit override)
      ansible.builtin.set_fact:
        block_engine_url: "{{ block_engine_url | default(jito_bam_endpoints[jito_target_bam_region].block_engine_url) }}"

- name: prepare - Stop validator service
  # Skipped on inactive install: the live `sol` service belongs to the other client and must keep running.
  when: not _fd_inactive
  block:
    - name: prepare - Check if validator service exists and is running
      ansible.builtin.systemd:
        name: "{{ validator_service_name }}"
      register: service_status
      changed_when: false
      failed_when: false

    - name: prepare - Stop validator service if running
      ansible.builtin.systemd:
        name: "{{ validator_service_name }}"
        state: stopped
        enabled: false
      register: stop_result
      retries: 3
      delay: 10
      until: stop_result is success
      when: service_status.status.ActiveState == "active"
      become: true

- name: prepare - Remove parameterized validator logrotate config and systemd units
  # Skipped on inactive install: these paths are keyed on the shared `sol` name and belong to the live client.
  when: not _fd_inactive
  block:
    - name: prepare - Remove parameterized validator logrotate config if it exists
      ansible.builtin.file:
        path: "/etc/logrotate.d/{{ validator_service_name }}"
        state: absent

    - name: prepare - Remove parameterized validator logrotate systemd service if it exists
      ansible.builtin.file:
        path: "/etc/systemd/system/validator-logrotate-{{ validator_service_name }}.service"
        state: absent

    - name: prepare - Remove parameterized validator logrotate systemd timer if it exists
      ansible.builtin.file:
        path: "/etc/systemd/system/validator-logrotate-{{ validator_service_name }}.timer"
        state: absent
  become: true

- name: prepare - Clear validator logs (opt-in)
  # Off by default: the systemd ExecStartPre already archives + prunes firedancer.log on each
  # (re)start, so wiping the whole logs dir here would destroy the forensic record from a prior
  # crash before the new process has proven it can start. Enable with clear_validator_logs=true.
  ansible.builtin.shell: |
    #!/bin/bash
    set -e
    rm -rf "{{ validator_logs_dir }}"/*
  become: true
  when: clear_validator_logs | default(false) | bool
