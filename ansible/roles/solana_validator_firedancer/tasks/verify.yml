---
- name: verify - Resolve inactive-install flag (defensive for tag-limited runs)
  ansible.builtin.set_fact:
    _fd_inactive: "{{ validator_inactive_install | default(false) | bool }}"

- name: verify - Check if fdctl binary exists
  ansible.builtin.stat:
    path: "/usr/local/bin/fdctl"
  register: fdctl_binary

- name: verify - Fail if fdctl binary is missing
  ansible.builtin.fail:
    msg: "fdctl binary not found at /usr/local/bin/fdctl"
  when: not fdctl_binary.stat.exists

# --- Inactive install: assert artifacts are staged, but do NOT expect the service to be running ---
- name: verify - Inactive install staged-artifact checks
  when: _fd_inactive
  block:
    - name: verify - Check staged Firedancer systemd unit exists
      ansible.builtin.stat:
        path: "{{ _fd_unit_dest }}"
      register: _fd_staged_unit

    - name: verify - Assert staged Firedancer unit and switch script are present
      ansible.builtin.assert:
        that:
          - _fd_staged_unit.stat.exists
        fail_msg: "Staged Firedancer unit not found at {{ _fd_unit_dest }}"
        success_msg: "Firedancer staged (inactive); live client untouched. Activate with switch-validator-client.sh."

    - name: verify - Confirm the live sol service was NOT taken over by Firedancer
      ansible.builtin.shell: pgrep -x fdctl
      register: _fd_inactive_proc
      changed_when: false
      failed_when: false

    - name: verify - Assert Firedancer is not running on inactive install
      ansible.builtin.assert:
        that:
          - _fd_inactive_proc.rc != 0
        fail_msg: >-
          fdctl is running on {{ inventory_hostname }} but this was an inactive (staged) install -
          Firedancer should NOT have started. Investigate before switching clients.
        success_msg: "fdctl is not running (correct for inactive install)."

# --- Active install: assert the service is up and Firedancer is running ---
- name: verify - Active install service checks
  when: not _fd_inactive
  block:
    - name: verify - Get validator systemd service status
      ansible.builtin.systemd:
        name: "{{ validator_service_name }}"
      register: validator_service_status
      changed_when: false

    - name: verify - Print validator service status
      ansible.builtin.debug:
        var: validator_service_status

    - name: verify - Assert validator service is active
      ansible.builtin.assert:
        that:
          - validator_service_status.status.ActiveState == "active"
        fail_msg: >-
          Validator service {{ validator_service_name }} is not active on {{ inventory_hostname }}
          (state: {{ validator_service_status.status.ActiveState | default('unknown') }}).
          Check the logs above for startup errors.
        success_msg: "Validator service {{ validator_service_name }} is active"

    - name: verify - Get last 50 lines of validator logs
      ansible.builtin.command: journalctl -u {{ validator_service_name }} -n 50 --no-pager --since "10 seconds ago"
      register: validator_logs
      changed_when: false

    - name: verify - Print last 50 lines of validator logs
      ansible.builtin.debug:
        var: validator_logs.stdout_lines

    - name: verify - Wait for fdctl process to appear (up to 30s)
      # pgrep -x matches the exact process name so it cannot match the wrapping shell's
      # own command line (which contains the literal string "fdctl"), unlike pgrep -f.
      ansible.builtin.shell: pgrep -x fdctl
      register: validator_process
      changed_when: false
      failed_when: false
      retries: 10
      delay: 3
      until: validator_process.rc == 0

    - name: verify - Fail if fdctl is not running
      ansible.builtin.fail:
        msg: |
          The fdctl process is NOT running on {{ inventory_hostname }}.
          The validator service failed to start, and no process was found.
          Please check the validator logs for errors.
      when: validator_process.rc != 0

    - name: verify - Print fdctl process PIDs
      ansible.builtin.debug:
        msg: "fdctl PIDs: {{ validator_process.stdout_lines }}"

    - name: verify - Check validator service file
      ansible.builtin.slurp:
        src: /etc/systemd/system/{{ validator_service_name }}.service
      register: validator_service_file

    - name: verify - Print validator service file
      ansible.builtin.debug:
        msg: "{{ validator_service_file.content | b64decode }}"

- name: verify - Check Firedancer config file
  ansible.builtin.slurp:
    src: "{{ firedancer_config_path }}"
  register: firedancer_config_file

- name: verify - Print Firedancer config
  # no_log: the rendered TOML includes [reporting] solana_metrics_config, which can carry
  # InfluxDB credentials (u=/p=). Inspect the file directly on the host when troubleshooting.
  ansible.builtin.debug:
    msg: "{{ firedancer_config_file.content | b64decode }}"
  no_log: true

- name: verify - Summary - Frankendancer validator verification complete
  ansible.builtin.debug:
    msg: |
      Frankendancer validator verification complete. Check service status and logs above for troubleshooting.
