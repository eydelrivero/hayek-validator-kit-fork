---
# Agave Validator Setup
# -------------------
# Sets up a Solana validator with Agave client.
#
# Usage:
# ------
# Run from /ansible directory:
#
# syntax check
# ansible-playbook playbooks/pb_setup_validator_agave.yml \
#   -i solana_setup_host.yml \
#   --limit host-charlie \
#   --syntax-check \
#   -e "target_host=host-charlie"
#
# ansible-playbook playbooks/pb_setup_validator_agave.yml \
#   -i solana_localnet.yml \
#   --limit host-charlie \
#   -e "target_host=host-charlie" \
#   -e "ansible_user=bob" \
#   -e "validator_name=penny" \
#   -e "agave_version=2.3.11" \
#   -e "solana_cluster=localnet" \
#   -e "build_from_source=true" \
#   -e "use_official_repo=true" \
#   -e "solana_validator_ha_version=0.1.19" \
#   -e "solana_validator_ha_install_from_source=false" \
#   -e "force_host_cleanup=true" \
#   -e "run_poh_cpu_affinity_fix=true" \
#   -K
#
# Extended vars:
# - validator_type (OPTIONAL): Validator identity mode. Defaults to hot-spare; set validator_type=primary to opt in.
# - build_from_source (OPTIONAL): Build from source instead of using precompiled binaries.
# - use_official_repo (OPTIONAL): Use official repository instead of forked repository.
# - solana_validator_ha_version (OPTIONAL): Version of solana-validator-ha to install. Defaults to the latest published binary release currently pinned in the role.
# - solana_validator_ha_install_from_source (OPTIONAL): Build solana-validator-ha from source instead of using the published GitHub release binary.
# - solana_validator_ha_runtime_enabled (OPTIONAL): Render and start the solana-validator-ha runtime service and config.
# - solana_validator_ha_pair_hosts / solana_validator_ha_inventory_group (OPTIONAL): Auto-derive HA peers when runtime is enabled.
# - solana_validator_ha_node_id (OPTIONAL): Stable globally-unique HA short name for this host (for example ark, fog, ice).
# - solana_validator_ha_priority (OPTIONAL): Deterministic failover priority for this host; lower value wins.
# - solana_validator_ha_passive_identity_path (OPTIONAL): Override the passive identity path when each host has a fixed named hot-spare identity.
# - solana_validator_ha_peers (OPTIONAL): Explicit peer mapping override when runtime is enabled.
# - force_host_cleanup (OPTIONAL): Cleanup target host if it has validator data from a different cluster.
# - run_poh_cpu_affinity_fix (OPTIONAL): Pin validator process to specific CPU core to improve PoH stability.
# - xdp_enabled (OPTIONAL): Enable or disable XDP flag injection in validator startup script (default is disabled).

- name: Install Agave Validator
  hosts: "{{ target_host }}"
  user: "{{ ansible_user }}"
  become: false

  pre_tasks:
    - name: Assert required parameters are defined
      ansible.builtin.assert:
        that:
          - target_host is defined
          - ansible_user is defined
        fail_msg: >
          Missing required playbook variables: target_host, ansible_user

    - name: Debug ansible_limit and target_host
      ansible.builtin.debug:
        msg:
          - "ansible_limit: {{ ansible_limit | default('not defined') }}"
          - "ansible_limit type: {{ ansible_limit | type_debug }}"
          - "target_host: {{ target_host }}"
          - "ansible_play_hosts: {{ ansible_play_hosts }}"

    - name: Validate that target_host matches the limited host
      ansible.builtin.assert:
        that:
          - ansible_limit is defined
          - target_host == ansible_limit
        fail_msg: >
          This playbook must be run with --limit to target exactly one host.
          Make sure you run this playbook with: --limit {{ target_host }} -e "target_host={{ target_host }}"

  roles:
    - role: solana_validator_agave
